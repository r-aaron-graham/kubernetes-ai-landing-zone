apiVersion: scheduling.k8s.io/v1
kind: PriorityClass
metadata:
  name: gpu-priority
value: 100000
globalDefault: false
description: "High priority for GPU workloads"
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: gpu-config
  namespace: ai-workloads
data:
  tolerations: |
    - key: "nvidia.com/gpu"
      operator: "Exists"
      effect: "NoSchedule"
  nodeSelector: |
    nvidia.com/gpu.present: "true"
